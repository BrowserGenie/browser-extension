<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrowserGenie</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>BrowserGenie</h1>
      <div id="connection-status" class="status disconnected">
        <span class="status-dot"></span>
        <span class="status-text">Disconnected</span>
      </div>
    </header>

    <!-- API Key Section -->
    <section class="section">
      <h2>API Key</h2>
      <div class="toggle-row">
        <label>Require API Key</label>
        <label class="switch">
          <input type="checkbox" id="api-key-toggle">
          <span class="slider"></span>
        </label>
      </div>
      <div id="api-key-section" class="hidden">
        <div class="key-display">
          <input type="text" id="api-key-display" readonly placeholder="No key generated">
          <button id="copy-key-btn" class="btn-icon" title="Copy">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          </button>
        </div>
        <div class="btn-row">
          <button id="generate-key-btn" class="btn btn-primary">Generate Key</button>
          <button id="rotate-key-btn" class="btn btn-secondary">Rotate Key</button>
        </div>
      </div>
    </section>

    <!-- URL Blocklist Section -->
    <section class="section">
      <h2>URL Blocklist</h2>
      <p class="hint">Extension won't work on these URLs. Supports wildcards (*.example.com)</p>
      <div class="input-row">
        <input type="text" id="blocklist-input" placeholder="e.g., *://bank.com/*">
        <button id="add-blocklist-btn" class="btn btn-primary">Add</button>
      </div>
      <ul id="blocklist" class="list"></ul>
    </section>

    <!-- Feature Toggles Section -->
    <section class="section">
      <h2>Feature Toggles</h2>
      <div id="feature-toggles"></div>
    </section>
  </div>
  <script src="popup.js"></script>
</body>
</html>
